version: 2

models:

  - name: stg_consultations_fixed
    description: "Cleaned consultations with timezone correction"

    columns:

      - name: consultation_id
        description: "Ensures one row per consultation for accurate reporting"
        tests:
          - not_null
          - unique

      - name: wait_time_minutes
        description: "Ensures wait time is present for patient wait time analysis"
        tests:
          - not_null

  - name: int_referrals_classified
    description: "Consultations classified into referral types"

    columns:

      - name: consultation_id
        description: "Ensures one row per consultation for correct aggregation"
        tests:
          - not_null
          - unique

      - name: referral_category
        description: "Ensures referral categories are valid for clinical reporting"
        tests:
          - accepted_values:
              values: ['doctor_referral', 'patient_requested_only', 'both', 'no_referral']